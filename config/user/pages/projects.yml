# 默认页面配置（请勿直接修改）。
# 建议复制到 config/user/pages/projects.yml 并按需调整。
title: 项目 # 页面标题
subtitle: 项目展示 # 页面副标题

# 指定使用的内置页面类型（由 Astro 组件渲染）
template: projects

# 页面分类与站点列表
#
# projects 页面采用“代码仓库风”卡片（repo 风格）。
# 统计信息（language/stars/forks）为自动获取数据：
# - 运行 `npm run sync-projects` 会联网抓取 GitHub 仓库信息，并写入 dev/ 缓存（仓库默认 gitignore）
# - `npm run build` 会 best-effort 刷新缓存；缓存缺失时卡片仅展示标题与描述
categories:
  - name: 个人储存库
    icon: fas fa-code # 分类图标（Font Awesome）
    sites:
      - name: mizuki-blog
        icon: fab fa-github
        description: 下一代 Material Design 3 博客主题（Astro 驱动）
        url: https://github.com/fqxmczw/mizuki-blog
      - name: CF-Request-Analytics-Panel
        icon: fab fa-github
        description: Cloudflare 多账号请求分析面板，支持按账号、区域、域名、子域名、Worker 服务名和时间范围筛选数据进行分析
        url: https://github.com/fqxmczw/CF-Request-Analytics-Panel
      - name: cloud-mail
        icon: fab fa-github
        description: 基于 Cloudflare 的电子邮件服务
        url: https://github.com/fqxmczw/cloud-mail
      - name: linux-xiaomi-raphael-uboot
        icon: fab fa-github
        description: linux-xiaomi-raphael-uboot
        url: https://github.com/fqxmczw/linux-xiaomi-raphael-uboot
      - name: CloudFlare-ImgBed
        icon: fab fa-github
        description: 基于 Cloudflare 构建的无服务器开源文件托管方案，支持图片托管、安全文件存储和个人云盘功能
        url: https://github.com/fqxmczw/CloudFlare-ImgBed
      - name: menav
        icon: fab fa-github
        description: 一键部署的个人导航站生成器，支持书签导入与自动构建，轻松整理展示您的网络收藏
        url: https://github.com/fqxmczw/menav
